name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - name: Check formatting
        run: uv run ruff format --check
      - name: Check lint
        run: uv run ruff check

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - name: Check types
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - name: Run tests
        run: uv run pytest -q

  original-csv-immutable:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: data/raw/regras-sisprev.csv must never be modified after import
        run: |
          count=$(git log --oneline -- data/raw/regras-sisprev.csv | wc -l)
          if [ "$count" -ne 1 ]; then
            echo "data/raw/regras-sisprev.csv has $count commits touching it — expected exactly 1."
            echo "This file is the frozen audit baseline and must never be overwritten."
            git log --oneline -- data/raw/regras-sisprev.csv
            exit 1
          fi

  achado-history-append-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Authored achado ids must never be deleted or renumbered
        run: |
          changes=$(git log --diff-filter=DR --name-status --format= -- 'okf/regras-sisprev/achados/achado-*.md')
          if [ -n "$changes" ]; then
            echo "Achado documents are append-only: deletion or rename detected in history."
            echo "$changes"
            exit 1
          fi

  bundle-imports-original:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - name: Committed bundle has exactly as many regra docs as the original CSV has rows
        run: |
          uv run python scripts/csv_to_okf.py --out /tmp/fresh-bundle
          fresh_count=$(find /tmp/fresh-bundle/regras -name 'regra-*.md' | wc -l)
          committed_count=$(find okf/regras-sisprev/regras -name 'regra-*.md' | wc -l)
          if [ "$committed_count" -ne "$fresh_count" ]; then
            echo "Committed bundle has $committed_count regra docs, but the original CSV has $fresh_count rows."
            echo "A rule appears to have been dropped from or added to okf/regras-sisprev/regras/."
            exit 1
          fi

  derived-csv-in-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - name: Derived artifacts (CSV + every index.md) must match the live bundle
        run: |
          uv run python scripts/gerar_indices.py
          derived="data/regras-sisprev.csv okf/regras-sisprev/regras/index.md okf/regras-sisprev/achados/index.md okf/regras-sisprev/index.md"
          if ! git diff --exit-code -- $derived > /dev/null; then
            echo "Derived artifacts are stale. Run: uv run python scripts/gerar_indices.py, then commit."
            git diff -- $derived
            exit 1
          fi

  validar-regras:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - name: P10 — structural invariants + detection<->achado bidirectionality
        run: uv run python scripts/validar_regras.py
