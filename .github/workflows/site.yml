name: Site

# Separate from ci.yml on purpose (RFC 0003 §6, CLAUDE.md): the site/
# toolchain (Node) never touches the Python gates (lint/typecheck/test/
# derived-csv-in-sync/original-raw-immutable/...). Path-filtered so it only
# runs when something the site actually depends on changes.
on:
  pull_request:
    paths:
      - "site/**"
      - "okf/**"
      - "scripts/emit_site_data.py"
      - ".github/workflows/site.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "okf/**"
      - "scripts/emit_site_data.py"
      - ".github/workflows/site.yml"

permissions:
  contents: read

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      # actions/setup-node pinned by tag, not SHA, unlike this repo's other
      # actions — the sandbox this workflow was authored in could not reach
      # the GitHub API to resolve an exact tag->SHA for third-party actions
      # not already used elsewhere in this repo (actions/checkout and
      # astral-sh/setup-uv above were copied verbatim from ci.yml's existing,
      # already-verified pins). Recommend pinning these by SHA (e.g. via
      # Dependabot) in a follow-up once that lookup is possible.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Emit site data (dados-do-site.json) — RFC 0003 §4
        run: ./site/scripts/emit-data.sh
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Build site (astro check && astro build)
        working-directory: site
        run: npm run build
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Smoke check — deployed page responds and matches this commit's SHA
        # RFC 0003 §7: a deploy that silently fails must not leave a stale
        # site serving an old commit's content unnoticed — this is the check
        # that makes that failure visible instead.
        run: |
          set -euo pipefail
          url="${{ steps.deployment.outputs.page_url }}"
          body="$(curl -fsSL "$url")"
          if ! grep -q "${{ github.sha }}" <<< "$body"; then
            echo "Deployed page at $url does not show the expected commit SHA ${{ github.sha }}."
            exit 1
          fi
          echo "OK: $url serves commit ${{ github.sha }}."
