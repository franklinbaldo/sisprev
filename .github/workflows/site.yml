name: Site

# Separate from ci.yml on purpose (RFC 0003 §6, CLAUDE.md): the site/
# toolchain (Node) never touches the Python gates (lint/typecheck/test/
# derived-csv-in-sync/original-raw-immutable/...).
#
# `push` to main has NO path filter, deliberately: the emitter
# (scripts/emit_site_data.py) depends on the whole Python domain library, and
# the RFC 0003 §2/§7 freshness proof requires every push to main to rebuild
# and republish — a path filter here would let the deployed SHA silently lag
# behind main whenever a commit touched something outside the filtered
# paths. `pull_request` keeps a path filter (a PR that only touches, say,
# docs/analysis/ doesn't need a site rebuild), widened to include
# scripts/**, pyproject.toml and uv.lock alongside site/** and okf/**.
on:
  pull_request:
    paths:
      - "site/**"
      - "okf/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/site.yml"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    # Mirrors ci.yml's own lint/typecheck/test split: a separate job/status
    # per concern, not one job silently doing everything. `astro check` IS
    # this project's "tsc --noEmit" — it type-checks every .ts file too
    # (verified: an intentional type error in a plain .ts file was caught),
    # plus .astro templates and the generated content-collection types that
    # a bare `tsc` can't parse on its own.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Emit site data (dados-do-site.json) — RFC 0003 §4
        # Needed even just to type-check: content.config.ts's collections
        # (and lib/site-data.ts's JSON import) only resolve once this exists.
        run: ./site/scripts/emit-data.sh
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Type-check (astro check)
        working-directory: site
        run: npm run check

  test:
    # The simulador's (RFC 0002) trivalent matching engine — site/src/lib/
    # simulador.ts, parse-sisprev.ts — is plain TS with no Astro/content
    # dependency, so this job doesn't need the emitter or a content sync,
    # unlike typecheck above.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Run unit tests (vitest)
        working-directory: site
        run: npm run test

  build:
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.7.19"
          enable-cache: true
      - run: uv sync --dev
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Emit site data (dados-do-site.json) — RFC 0003 §4
        run: ./site/scripts/emit-data.sh
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Build site (astro build)
        working-directory: site
        run: npm run build
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
      - name: Smoke check — deployed page responds and matches this commit's SHA
        # RFC 0003 §7: a deploy that silently fails must not leave a stale
        # site serving an old commit's content unnoticed — this is the check
        # that makes that failure visible instead. Retries: Pages' CDN can
        # briefly keep serving the previous deploy right after this action
        # reports success, so a single immediate curl can false-negative.
        run: |
          set -euo pipefail
          url="${{ steps.deployment.outputs.page_url }}"
          sha="${{ github.sha }}"
          max_attempts=10
          delay_seconds=6
          for attempt in $(seq 1 "$max_attempts"); do
            if body="$(curl -fsSL "$url")" && grep -q "$sha" <<< "$body"; then
              echo "OK: $url serves commit $sha (attempt $attempt/$max_attempts)."
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts: $url does not yet show commit $sha. Retrying in ${delay_seconds}s..."
            sleep "$delay_seconds"
          done
          echo "Deployed page at $url still does not show the expected commit SHA $sha after $max_attempts attempts."
          exit 1
